<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #f0f4ff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        color: #1e1b4b;
      }
      h1 {
        color: #4338ca;
        font-size: 1.6rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #6366f1;
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }
      .progress-bar {
        width: 100%;
        max-width: 600px;
        height: 6px;
        background: #e0e7ff;
        border-radius: 3px;
        margin-bottom: 1.5rem;
      }
      .progress-fill {
        height: 100%;
        background: #6366f1;
        border-radius: 3px;
        transition: width 0.3s;
      }
      .question-card {
        background: white;
        border-radius: 1.25rem;
        padding: 2rem;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.1);
        width: 100%;
        max-width: 600px;
      }
      .q-counter {
        font-size: 0.75rem;
        font-weight: 700;
        color: #6366f1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
      .q-image {
        width: 100%;
        max-height: 220px;
        object-fit: contain;
        border-radius: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .q-text {
        font-size: 1.15rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .q-hint {
        font-size: 0.78rem;
        color: #6b7280;
        margin-bottom: 1.25rem;
      }
      .answers {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .answer-btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 1.25rem;
        border-radius: 0.85rem;
        border: 2px solid #e0e7ff;
        background: #f5f3ff;
        cursor: pointer;
        text-align: left;
        font-size: 0.95rem;
        font-weight: 500;
        color: #1e1b4b;
        transition: all 0.15s;
      }
      .answer-btn:hover:not(:disabled) {
        border-color: #6366f1;
        background: #ede9fe;
      }
      .answer-btn.selected {
        border-color: #6366f1;
        background: #ede9fe;
      }
      .answer-btn.correct {
        border-color: #059669;
        background: #d1fae5;
        color: #065f46;
      }
      .answer-btn.wrong {
        border-color: #dc2626;
        background: #fee2e2;
        color: #7f1d1d;
      }
      .answer-btn.missed {
        border-color: #059669;
        background: #ecfdf5;
        border-style: dashed;
      }
      .answer-btn:disabled {
        cursor: default;
      }
      .btn-label {
        flex: 1;
      }
      .btn-icon {
        font-size: 1.2rem;
        flex-shrink: 0;
      }
      .nav {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        align-items: center;
      }
      .nav-btn {
        padding: 0.65rem 1.5rem;
        border-radius: 0.75rem;
        border: none;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary {
        background: #6366f1;
        color: white;
      }
      .btn-primary:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #e0e7ff;
        color: #4338ca;
      }
      .btn-secondary:hover {
        background: #c7d2fe;
      }
      .btn-primary:disabled,
      .btn-secondary:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .score-card {
        text-align: center;
        background: white;
        border-radius: 1.25rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.1);
        width: 100%;
        max-width: 600px;
      }
      .score-emoji {
        font-size: 3.5rem;
        margin-bottom: 1rem;
      }
      .score-num {
        font-size: 2.5rem;
        font-weight: 700;
        color: #4338ca;
      }
      .score-label {
        color: #6b7280;
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
      }
      .restart-btn {
        padding: 0.75rem 2rem;
        border-radius: 0.75rem;
        border: none;
        background: #6366f1;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      .restart-btn:hover {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <h1>Quiz</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div id="app"></div>

    <script>
      const data = window.APP_DATA || { questions: [] }
      const qs = data.questions || []

      let current = 0
      let selections = qs.map(() => new Set())
      let submitted = qs.map(() => false)
      let score = 0

      function render() {
        const app = document.getElementById('app')
        const subtitle = document.getElementById('subtitle')
        const progress = document.getElementById('progress')

        subtitle.textContent = `${qs.length} question${qs.length !== 1 ? 's' : ''}`
        progress.style.width = qs.length ? `${((current + 1) / qs.length) * 100}%` : '0%'

        if (qs.length === 0) {
          app.innerHTML =
            '<div class="question-card"><p style="color:#6b7280;text-align:center">No questions in this quiz.</p></div>'
          return
        }

        if (current >= qs.length) {
          renderScore()
          return
        }

        const q = qs[current]
        const isMulti = q.multipleCorrect
        const done = submitted[current]
        const sel = selections[current]

        let answersHtml = q.answers
          .map((a) => {
            let cls = 'answer-btn'
            let icon = isMulti ? '☐' : '○'
            if (done) {
              if (a.isCorrect && sel.has(a.id)) {
                cls += ' correct'
                icon = '✓'
              } else if (!a.isCorrect && sel.has(a.id)) {
                cls += ' wrong'
                icon = '✗'
              } else if (a.isCorrect && !sel.has(a.id)) {
                cls += ' missed'
                icon = isMulti ? '☑' : '●'
              } else icon = isMulti ? '☐' : '○'
            } else if (sel.has(a.id)) {
              cls += ' selected'
              icon = isMulti ? '☑' : '●'
            }
            return `<button class="${cls}" ${done ? 'disabled' : ''} onclick="toggleAnswer('${a.id}')">\n          <span class="btn-icon">${icon}</span>\n          <span class="btn-label">${a.text}</span>\n        </button>`
          })
          .join('\n')

        const canSubmit = sel.size > 0 && !done

        app.innerHTML = `
        <div class="question-card">
          <div class="q-counter">Question ${current + 1} of ${qs.length}</div>
          ${q.imagePath ? `<img src="${q.imagePath}" class="q-image" alt="Question image">` : ''}
          <div class="q-text">${q.question || '(no question text)'}</div>
          <div class="q-hint">${isMulti ? 'Select all correct answers' : 'Select one answer'}</div>
          <div class="answers">${answersHtml}</div>
          <div class="nav">
            <button class="nav-btn btn-secondary" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>← Back</button>
            ${!done ? `<button class="nav-btn btn-primary" onclick="submitAnswer()" ${!canSubmit ? 'disabled' : ''}>Check answer</button>` : ''}
            ${done && current < qs.length - 1 ? `<button class="nav-btn btn-primary" onclick="go(1)">Next →</button>` : ''}
            ${done && current === qs.length - 1 ? `<button class="nav-btn btn-primary" onclick="current = qs.length; render()">See results</button>` : ''}
          </div>
        </div>`
      }

      function toggleAnswer(aid) {
        if (submitted[current]) return
        const q = qs[current]
        const sel = selections[current]
        if (!q.multipleCorrect) {
          sel.clear()
        }
        sel.has(aid) ? sel.delete(aid) : sel.add(aid)
        render()
      }

      function submitAnswer() {
        submitted[current] = true
        const q = qs[current]
        const sel = selections[current]
        const correctIds = new Set(q.answers.filter((a) => a.isCorrect).map((a) => a.id))
        const allCorrect =
          [...correctIds].every((id) => sel.has(id)) && [...sel].every((id) => correctIds.has(id))
        if (allCorrect) score++
        render()
      }

      function go(dir) {
        current = Math.max(0, Math.min(qs.length - 1, current + dir))
        render()
      }

      function renderScore() {
        const pct = qs.length ? Math.round((score / qs.length) * 100) : 0
        const emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '💪' : '🤔'
        document.getElementById('progress').style.width = '100%'
        document.getElementById('app').innerHTML = `
        <div class="score-card">
          <div class="score-emoji">${emoji}</div>
          <div class="score-num">${score} / ${qs.length}</div>
          <div class="score-label">You got ${pct}% correct</div>
          <button class="restart-btn" onclick="restart()">Try again</button>
        </div>`
      }

      function restart() {
        current = 0
        score = 0
        selections = qs.map(() => new Set())
        submitted = qs.map(() => false)
        render()
      }

      render()
    </script>
  </body>
</html>
