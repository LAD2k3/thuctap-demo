name: Build Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          # Vite projects
          - project: demo-game-groupsort2/player/vite-project
            type: vite
            os: ubuntu-latest
          # Add more project paths here

          # Electron projects
          - project: demo-desktop-app-electron/electron-app
            type: electron
            os: windows-latest
          # - project: demo-desktop-app-electron/electron-app
          #   type: electron
          #   os: macos-latest
          - project: demo-desktop-app-electron/electron-app
            type: electron
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ${{ matrix.project }}/.yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles(format('{0}/yarn.lock', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: yarn install --immutable

      - name: Build project
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          if [ "${{ matrix.type }}" = "vite" ]; then
            yarn build
          else
            yarn build
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              yarn build:win
            elif [[ "$RUNNER_OS" == "macOS" ]]; then
              yarn build:mac
            else
              yarn build:linux
            fi
          fi

      - name: Sanitize artifact name
        shell: bash
        run: |
          ARTIFACT_NAME="build-${{ matrix.type }}-$(echo "${{ matrix.project }}" | tr '/' '-')"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.os }}
          path: |
            ${{ matrix.project }}/dist
            ${{ matrix.project }}/release
